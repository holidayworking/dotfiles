name: test
on:
  pull_request:
    branches:
      - main
jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - run: nix flake check --all-systems --print-build-logs
    timeout-minutes: 10
  diff:
    permissions:
      contents: read
    needs:
      - check
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - uses: natsukium/nix-diff-action@b5c316c6cafc8470037d7f330b178aaeeba96ba4 # v1.1.0
        with:
          mode: diff-only
          attributes: |
            - displayName: ${{ matrix.host }}
              attribute: ${{ matrix.attribute }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - host: aries
            attribute: darwinConfigurations.aries.system
            runner: macos-latest
          - host: gemini
            attribute: nixosConfigurations.gemini.config.system.build.toplevel
            runner: ubuntu-latest
  comment:
    permissions:
      actions: read
      pull-requests: write
    needs:
      - diff
    runs-on: ubuntu-latest
    steps:
      - uses: natsukium/nix-diff-action@b5c316c6cafc8470037d7f330b178aaeeba96ba4 # v1.1.0
        with:
          mode: comment-only
    timeout-minutes: 10
